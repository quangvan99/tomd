services:
  tomd:
    build: .
    image: tomd:latest
    container_name: tomd
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "9000:9000"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTHONPATH=/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "9000"]
    restart: unless-stopped
